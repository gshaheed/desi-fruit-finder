<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout cancelled — Desi Fruit Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fff6ea;--ink:#241a12;--ink-soft:#6b5b4d;--line:#e7d6bf;--card:#fffaf2}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;font-family:"Space Grotesk",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55}
  .card{max-width:480px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:36px 32px;text-align:center;box-shadow:0 16px 40px rgba(58,34,10,.12)}
  h1{font-family:"Fraunces",serif;font-size:clamp(26px,5vw,34px);margin:0 0 12px}
  p{color:var(--ink-soft);margin:0 0 20px;font-size:15px}
  a.btn{display:inline-block;background:var(--ink);color:var(--paper);text-decoration:none;border-radius:100px;padding:14px 26px;font-weight:600;font-size:15px;margin:4px}
  a.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
</style>
</head>
<body>
  <div class="card">
    <h1>Checkout cancelled</h1>
    <p>No charge was made. Your cart is still saved — pick up where you left off.</p>
    <a class="btn" href="index.html#finder">Return to finder</a>
    <a class="btn ghost" href="index.html" onclick="setTimeout(()=>document.getElementById('cartToggle')?.click(),400);return true;">Open cart</a>
  </div>
</body>
</html>
